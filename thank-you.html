<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkan: Request Received</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Nunito:wght@200;300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .thankyou-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    .thankyou-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 50%, rgba(47, 47, 228, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .thankyou-box {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3rem 2.5rem;
      text-align: center;
    }
    .thankyou-icon {
      width: 48px;
      height: 48px;
      background: var(--accent-dim);
      border: 1px solid rgba(47, 47, 228, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.75rem;
    }
    .thankyou-icon svg {
      width: 22px;
      height: 22px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .thankyou-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
    }
    .thankyou-box h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 1rem;
      color: var(--text);
    }
    .thankyou-box p {
      font-size: 0.9375rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">kalkan</a>
</nav>

<div class="thankyou-wrap">
  <div class="thankyou-box">
    <div class="thankyou-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="thankyou-label">// request received</div>
    <h1>You're on the list.</h1>
    <p>Your request came through. I'll review it and get back to you directly within 24 hours.</p>
    <a href="index.html" class="btn-primary">Back to Home</a>
  </div>
</div>

<!-- Footer -->
<footer>
  <div class="footer-inner">
    <span class="footer-logo">kalkan</span>
    <span class="footer-copy">&copy; 2026 Kalkan. All rights reserved.</span>
    <span class="footer-contact"><a href="mailto:info@kalkanx.com">info@kalkanx.com</a></span>
  </div>
</footer>

</body>
</html>
